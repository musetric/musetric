# Allowed Conventional Commit types and scopes.
#
# Format: `type(scope): subject`  (scope is required)
#   feat(player): add loop region
#   fix(decoder): handle empty mp3 frames
#   ci(github): cancel superseded prTitle runs
#
# The full line `type(scope): subject` must be 70 characters or less.
#
# Read by .github/workflows/prTitle.yml and enforced on every PR title.
# Inline comments below document what each key means and when to use it.
#
# Adding a new scope: add it here and merge to main first — the linter reads
#   this list from the base branch, so a PR cannot use a scope that is not yet on main.
# Removing a feature + its scope: do it in one PR (the scope still exists on the base branch).

# Type = what kind of change it is.
types:
  - feat # new user-facing functionality
  - fix # bug fix in existing behavior
  - perf # speed/memory optimization, behavior unchanged
  - refactor # internal code rewritten, behavior unchanged
  - revert # roll back a previously merged change
  - docs # documentation, comments, readme only
  - test # tests added/changed, no production code touched
  - build # build system & packaged artifacts (vite, ts emit)
  - ci # CI/CD pipelines (this workflow, etc.)
  - chore # housekeeping that touches no production code, build, or CI

# Scope = which area the change belongs to.
scopes:
  # Features
  - calibration # audio input/output calibration
  - chords # chord detection & display
  - decoder # decoding input audio files
  - key # musical key detection / transpose
  - player # track playback
  - recording # audio capture / recording
  - rhythm # tempo, beat, metronome
  - subtitle # lyrics / subtitle track
  - timeline # time ruler, cursor, seeking
  - translation # app localization: translation values & i18n support
  - waveform # amplitude waveform visualization
  # Libraries
  - ai # neural-network inference
  - api # packages/api contracts & client/server integration
  - db # packages/backend-db data access, entities, schema
  - engine # packages/engine audio engine: playback/decode/visualization orchestration
  - fft # FFT signal-processing core behind visualizations
  - spectrogram # frequency spectrogram visualization
  - toolkit # packages/toolkit backend media/processing helpers
  - utils # packages/utils low-level shared utilities
  # App
  - backend # packages/backend Fastify server & orchestration
  - frontend # packages/frontend app shell (cross-feature)
  - landing # packages/landing marketing site
  # Quality & tooling
  - agent # agent guidance & config (AGENTS.md, AI tooling)
  - bench # benchmarks & perf measurement (packages/performance)
  - deps # dependency add / update / remove
  - format # Prettier formatting and editorconfig
  - github # repo & GitHub Actions settings (workflows, templates)
  - lint # ESLint rules / packages/eslint-config
  - ts # TypeScript config & strictness (tsconfig, types)
  - license # license headers & third-party notices

name: Desktop Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 26.2.0
          package-manager-cache: false
      - run: npm install -g corepack@latest --force
      - run: corepack enable
      - run: corepack prepare yarn@4.17.1 --activate
      - uses: actions/cache@v5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-
      - run: yarn --immutable --mode=skip-build
      - run: yarn build:desktop
      - run: yarn workspace @musetric/desktop pack:installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v7
        with:
          name: musetric-desktop-${{ runner.os }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            packages/desktop/build/*.exe
            packages/desktop/build/*.exe.blockmap
            packages/desktop/build/*.dmg
            packages/desktop/build/*.AppImage
